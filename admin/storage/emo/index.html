<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Panel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <div style="align-items: center; display: flex; flex-direction: column; justify-content: center; height: 100vh;">
        <form id="redirectForm">
            <label for="field1">Password:</label>
            <input type="password" id="field1" name="field1" required>
            <br><br>
            <button type="submit">Submit</button>
        </form>

        <script>
        document.getElementById('redirectForm').addEventListener('submit', function(event) {
            // Prevent the form from refreshing the page
            event.preventDefault();

            // Get the values from the inputs
            const val1 = document.getElementById('field1').value;

            // Define your "certain values"
            const secret1 = "secret";

            // Check if they match
            if (val1 === secret1) {
                // Redirect to the new page
                window.location.href = "unlocked.html";
            } else {
                alert("According to Hackers (1995), the 4 most commonly used passwords are 'love', 'sex', 'secret', and 'god'.");
            }
        });
    </script>
    </div>
</body>
