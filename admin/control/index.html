<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Panel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <div style="align-items: center; display: flex; flex-direction: column; justify-content: center; height: 100vh;">
        <h1> Welcome to the YZB Control Panel! </h1>
        <br>
        <br>
        <div class="desktop-grid">
            <a href="editor.html" class="icon-wrapper">
                <div class="icon-image">
                    <img src="front_page.webp" alt="Front Page Editor">
                </div>
                <span class="icon-text">Edit the front page</span>
            </a>

            <button class="icon-wrapper" onclick="alert('Success! Drones are on the way and will detonate in around 3 minutes!')">
                <div class="icon-image">
                    <img src="explosion.webp" alt="Folder">
                </div>
                <span class="icon-text">Blow up Yezetsu's house</span>
            </button>
        </div>
    </div>
</body>
