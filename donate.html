<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
        rel="stylesheet">

    <meta charset="UTF-8">
    <title>GIVE US MONEY</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Official Donation Portal</h1>
        <p>Please select an amount to help our very important cause.</p>

        <div style="margin-bottom: 20px;">
            <button onclick="setAmount('45,000,000')">$45 Million</button>
            <button onclick="setAmount('1,000,000,000')">$1 Billion</button>
            <button onclick="setAmount('Your Firstborn')">Firstborn Child</button>
            <button onclick="setAmount('The Moon')">The Moon (Physical)</button>
        </div>

        <label for="amount">Custom Amount:</label><br>
        <input type="text" id="amount" placeholder="Your entire life savings">

        <br><br>

        <button onclick="donate()">Send Payment Now</button>

        <p id="thanks" style="color: green; font-weight: bold; display: none;"></p>
    </div>

    <script>
        function setAmount(val) {
            document.getElementById('amount').value = val;
        }

        function donate() {
            const inputField = document.getElementById('amount');
            let val = inputField.value.trim();
            const msg = document.getElementById('thanks');

            if (!val) {
                alert("Error: Please enter an amount or we can't buy our island.");
                return;
            }

            // Remove commas for the check, then see if it's a pure number
            let cleanVal = val.replace(/,/g, '');
            let displayVal = val;

            if (!isNaN(cleanVal) && cleanVal !== "") {
                displayVal = val + " dollars";
            }
            else {
                displayVal = displayVal.toLowerCase();
                displayVal = displayVal.replaceAll("my", "your");
            }

            msg.innerText = "Success! Thank you for donating " + displayVal + ". We have already started spending it.";
            msg.style.display = "block";
            inputField.value = "";
        }
    </script>

</body>

</html>
